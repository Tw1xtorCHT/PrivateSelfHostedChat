<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Monospace;background:#fff;height:100vh;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-width:900px;margin:0 auto}
#nick-screen{display:flex;align-items:center;justify-content:center;height:100vh;text-align:center}
#nick-screen input{border:1px solid #000;padding:8px;font-family:Monospace;font-size:14px;width:200px}
#nick-screen button{background:#000;color:#fff;border:none;padding:8px 20px;cursor:pointer;font-family:Monospace;margin-left:5px}
#chat-screen{display:none;flex-direction:column;height:100vh}
#header{padding:8px 10px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#666}
#messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column}
.msg{margin-bottom:8px;max-width:75%}
.msg.mine{align-self:flex-end}
.msg .bubble{padding:6px 12px;border-radius:1.3em;display:inline-block;word-wrap:break-word;max-width:100%}
.msg.other .bubble{background:#e5e4e4;color:#000}
.msg.mine .bubble{background:#000;color:#fff}
.msg .meta{font-size:11px;color:#999;margin-bottom:2px;padding:0 12px}
.msg.mine .meta{text-align:right}
.msg .file-link{display:block;margin-top:4px}
.msg .file-link a{color:inherit;text-decoration:underline}
.system{text-align:center;font-size:12px;color:#999;margin:10px 0}
#typing-area{font-size:11px;color:#999;padding:2px 10px;height:18px}
#input-area{padding:10px;border-top:1px solid #eee;display:flex;gap:5px;align-items:center}
#input-area textarea{flex:1;border:1px solid #bbb;padding:8px;font-family:Monospace;font-size:14px;resize:none;height:36px}
#input-area textarea:focus{outline:none;border-color:#000}
#input-area button{background:#000;color:#fff;border:none;padding:8px 12px;cursor:pointer;font-family:Monospace;font-size:13px;white-space:nowrap}
.call-popup{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:100;flex-direction:column;align-items:center;justify-content:center;color:#fff}
.call-popup.active{display:flex}
.call-popup h3{margin-bottom:15px}
.call-popup button{background:#fff;color:#000;border:none;padding:10px 20px;cursor:pointer;font-family:Monospace;font-size:14px;margin:5px}
.call-popup button.end{background:#cc0000;color:#fff}
.levels{display:flex;gap:30px;margin:15px 0}
.level-box{text-align:center}
.level-label{font-size:12px;margin-bottom:5px}
.level-bar-bg{width:25px;height:120px;background:rgba(255,255,255,0.2);border:1px solid #fff;position:relative}
.level-bar{position:absolute;bottom:0;width:100%;background:#fff;transition:height 0.05s}
#call-timer{font-size:28px;font-weight:bold;margin:10px 0}
#call-status{font-size:13px;margin:5px 0}
#drop-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:50;align-items:center;justify-content:center;color:#fff;font-size:24px}
</style>
</head>
<body>
<div id="app">
<div id="nick-screen">
<div>
<h2>Enter your name</h2><br>
<input type="text" id="nick-input" placeholder="Name" onkeydown="if(event.key==='Enter')joinChat()">
<button onclick="joinChat()">Join</button>
</div>
</div>
<div id="chat-screen">
<div id="header"><span id="users-list"></span><span id="online-count"></span></div>
<div id="messages"></div>
<div id="typing-area"></div>
<div id="input-area">
<button onclick="document.getElementById('file-input').click()">+</button>
<input type="file" id="file-input" style="display:none" onchange="sendFile(this)">
<textarea id="msg-input" placeholder="Type..." onkeydown="return onKey(event)" oninput="onType()"></textarea>
<button onclick="sendMsg()">Send</button>
<button onclick="toggleCall()">&#128222;</button>
</div>
</div>
</div>
<div class="call-popup" id="call-popup">
<h3>Voice Call</h3>
<div class="levels">
<div class="level-box"><div class="level-label">You</div><div class="level-bar-bg"><div class="level-bar" id="localLevel"></div></div></div>
<div class="level-box"><div class="level-label">Peer</div><div class="level-bar-bg"><div class="level-bar" id="remoteLevel"></div></div></div>
</div>
<div id="call-timer"></div>
<div id="call-status">Press Call</div>
<div>
<button onclick="startCall()">Call</button>
<button onclick="toggleMute()" id="mute-btn">Mute</button>
<button class="end" onclick="endCall()">End</button>
</div>
<audio id="remoteAudio" autoplay></audio>
</div>
<div id="drop-overlay">Drop file here</div>
<script src="/socket.io/socket.io.js"></script>
<script>
var socket=io();
socket.on("connect_error",function(err){if(err.message==="unauthorized"){location.href="/login"}});
var myNick=null;
var typingTimeout=null;
var isTyping=false;
var typingUsers={};

// CALL VARS
var pc=null,localStream=null,isMuted=false,callTimer=null,callSec=0;
var audioCtx=null,localAn=null,remoteAn=null,levelRAF=null;
var iceConfig={iceServers:[{urls:"stun:stun.l.google.com:19302"}]};

// Try to load TURN config
fetch("/turn-config").then(r=>r.json()).then(d=>{if(d.url)iceConfig.iceServers.push({urls:d.url,username:d.user,credential:d.pass})}).catch(()=>{});

// CHAT
function joinChat(){
var n=document.getElementById("nick-input").value.trim();
if(!n)return;
myNick=n;
socket.emit("login",{nick:n});
}
socket.on("force-login",function(msg){alert(msg);myNick=null});
socket.on("user-joined",function(d){
document.getElementById("nick-screen").style.display="none";
document.getElementById("chat-screen").style.display="flex";
updateUsers(d.users);
addSystem(d.nick+" joined");
});
socket.on("user-left",function(d){
updateUsers(d.users);
addSystem(d.nick+" left");
delete typingUsers[d.nick];
showTyping();
});
socket.on("history",function(msgs){
msgs.forEach(function(m){addMessage(m)});
scrollBottom();
});
socket.on("message",function(m){addMessage(m);scrollBottom()});
socket.on("file",function(d){addFile(d);scrollBottom()});
socket.on("typing",function(d){
if(d.status){typingUsers[d.nick]=true}else{delete typingUsers[d.nick]}
showTyping();
});
socket.on("chat-cleared",function(){
document.getElementById("messages").innerHTML="";
addSystem("Chat cleared");
});

// Call events
socket.on("call-offer",async function(d){
document.getElementById("call-popup").classList.add("active");
document.getElementById("call-status").innerText="Incoming call...";
await setupAudio();
pc=createPC();
await pc.setRemoteDescription(new RTCSessionDescription(d.offer));
var ans=await pc.createAnswer();
await pc.setLocalDescription(ans);
socket.emit("call-answer",{answer:ans});
startTimer();
});
socket.on("call-answer",async function(d){
await pc.setRemoteDescription(new RTCSessionDescription(d.answer));
document.getElementById("call-status").innerText="Connected";
startTimer();
});
socket.on("ice-candidate",async function(d){if(pc)await pc.addIceCandidate(new RTCIceCandidate(d.candidate))});
socket.on("call-end",function(){endCall();document.getElementById("call-status").innerText="Call ended"});

function updateUsers(list){
document.getElementById("users-list").innerText=list.join(", ");
document.getElementById("online-count").innerText=list.length+" online";
}
function addSystem(t){
var d=document.createElement("div");d.className="system";d.innerText=t;
document.getElementById("messages").appendChild(d);
}
function addMessage(m){
var wrap=document.createElement("div");
wrap.className="msg "+(m.from===myNick?"mine":"other");
var meta=document.createElement("div");meta.className="meta";meta.innerText=m.from;
var bub=document.createElement("div");bub.className="bubble";bub.innerText=m.text;
wrap.appendChild(meta);wrap.appendChild(bub);
document.getElementById("messages").appendChild(wrap);
}
function addFile(d){
var wrap=document.createElement("div");
wrap.className="msg "+(d.from===myNick?"mine":"other");
var meta=document.createElement("div");meta.className="meta";meta.innerText=d.from;
var bub=document.createElement("div");bub.className="bubble";
var link=document.createElement("a");
link.href=d.url;link.download=d.name;link.innerText=d.name;link.style.color="inherit";
bub.appendChild(link);
if(d.type&&d.type.match(/^image/)){var img=document.createElement("img");img.src=d.url;img.style.maxWidth="100%";img.style.marginTop="5px";bub.appendChild(img)}
wrap.appendChild(meta);wrap.appendChild(bub);
document.getElementById("messages").appendChild(wrap);
}
function sendMsg(){
var inp=document.getElementById("msg-input");
var t=inp.value.trim();if(!t)return;
socket.emit("message",{text:t});
inp.value="";onType();
}
function sendFile(input){
var file=input.files[0];if(!file)return;
if(file.size>50*1024*1024){alert("Max 50MB");return}
var r=new FileReader();
r.onload=function(e){socket.emit("file",{name:file.name,type:file.type,url:e.target.result})};
r.readAsDataURL(file);
input.value="";
}
function onKey(e){if(e.key==="Enter"&&!e.shiftKey){sendMsg();return false}return true}
function onType(){
var v=document.getElementById("msg-input").value;
if(v&&!isTyping){isTyping=true;socket.emit("typing",true)}
if(!v&&isTyping){isTyping=false;socket.emit("typing",false)}
}
function showTyping(){
var names=Object.keys(typingUsers);
document.getElementById("typing-area").innerText=names.length?names.join(", ")+" typing...":"";
}
function scrollBottom(){var m=document.getElementById("messages");m.scrollTop=m.scrollHeight}

// DRAG DROP
var body=document.body;
body.addEventListener("dragover",function(e){e.preventDefault();document.getElementById("drop-overlay").style.display="flex"});
body.addEventListener("dragleave",function(e){e.preventDefault();document.getElementById("drop-overlay").style.display="none"});
body.addEventListener("drop",function(e){
e.preventDefault();document.getElementById("drop-overlay").style.display="none";
var files=e.dataTransfer.files;
for(var i=0;i<files.length;i++){
var file=files[i];if(file.size>50*1024*1024){alert("Max 50MB");return}
var r=new FileReader();
r.onload=(function(f){return function(ev){socket.emit("file",{name:f.name,type:f.type,url:ev.target.result})}})(file);
r.readAsDataURL(file);
}
});

// CALLS
function toggleCall(){document.getElementById("call-popup").classList.toggle("active")}
async function setupAudio(){
if(localStream)return;
localStream=await navigator.mediaDevices.getUserMedia({video:false,audio:true});
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
localAn=audioCtx.createAnalyser();localAn.fftSize=256;
audioCtx.createMediaStreamSource(localStream).connect(localAn);
updateLevels();
}
function createPC(){
var p=new RTCPeerConnection(iceConfig);
localStream.getTracks().forEach(function(t){p.addTrack(t,localStream)});
p.ontrack=function(e){
document.getElementById("remoteAudio").srcObject=e.streams[0];
remoteAn=audioCtx.createAnalyser();remoteAn.fftSize=256;
audioCtx.createMediaStreamSource(e.streams[0]).connect(remoteAn);
};
p.onicecandidate=function(e){if(e.candidate)socket.emit("ice-candidate",{candidate:e.candidate})};
return p;
}
async function startCall(){
await setupAudio();
pc=createPC();
var offer=await pc.createOffer();
await pc.setLocalDescription(offer);
socket.emit("call-offer",{offer:offer});
document.getElementById("call-status").innerText="Calling...";
}
function endCall(){
if(pc){pc.close();pc=null}
if(localStream){localStream.getTracks().forEach(function(t){t.stop()});localStream=null}
document.getElementById("remoteAudio").srcObject=null;
stopTimer();stopLevels();
socket.emit("call-end");
document.getElementById("call-status").innerText="Call ended";
setTimeout(function(){document.getElementById("call-popup").classList.remove("active")},1500);
}
function toggleMute(){
if(!localStream)return;
isMuted=!isMuted;
localStream.getAudioTracks().forEach(function(t){t.enabled=!isMuted});
document.getElementById("mute-btn").innerText=isMuted?"Unmute":"Mute";
}
function updateLevels(){
var lb=document.getElementById("localLevel"),rb=document.getElementById("remoteLevel");
if(localAn){var d=new Uint8Array(localAn.frequencyBinCount);localAn.getByteFrequencyData(d);var a=d.reduce(function(x,y){return x+y},0)/d.length;lb.style.height=Math.min(100,(a/128)*100)+"%"}else{lb.style.height="0%"}
if(remoteAn){var d2=new Uint8Array(remoteAn.frequencyBinCount);remoteAn.getByteFrequencyData(d2);var a2=d2.reduce(function(x,y){return x+y},0)/d2.length;rb.style.height=Math.min(100,(a2/128)*100)+"%"}else{rb.style.height="0%"}
levelRAF=requestAnimationFrame(updateLevels);
}
function stopLevels(){if(levelRAF)cancelAnimationFrame(levelRAF);if(audioCtx){audioCtx.close();audioCtx=null}localAn=null;remoteAn=null;document.getElementById("localLevel").style.height="0%";document.getElementById("remoteLevel").style.height="0%"}
function startTimer(){callSec=0;callTimer=setInterval(function(){callSec++;var m=String(Math.floor(callSec/60)).padStart(2,"0");var s=String(callSec%60).padStart(2,"0");document.getElementById("call-timer").innerText=m+":"+s},1000)}
function stopTimer(){clearInterval(callTimer);document.getElementById("call-timer").innerText=""}
</script>
</body>
</html>
