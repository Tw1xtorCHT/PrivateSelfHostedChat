<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Monospace;background:#fff;display:flex;align-items:center;justify-content:center;height:100vh}
.box{text-align:center}
h2{margin-bottom:20px}
input{border:1px solid #000;padding:10px;font-family:Monospace;font-size:14px;width:220px}
button{background:#000;color:#fff;border:none;padding:10px 20px;cursor:pointer;font-family:Monospace;font-size:14px;margin-left:5px}
.err{color:red;margin-top:10px;font-size:13px}
</style>
</head>
<body>
<div class="box">
<h2>Private Chat</h2>
<div><input type="password" id="p" placeholder="Password" onkeydown="if(event.key==='Enter')go()"><button onclick="go()">Enter</button></div>
<div class="err" id="e"></div>
</div>
<script>
async function go(){
var r=await fetch("/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:document.getElementById("p").value})});
var d=await r.json();
if(d.ok){location.href="/"}
else{document.getElementById("e").innerText=d.blocked?"Blocked. Wait 5 minutes.":"Wrong password ("+d.remaining+" left)"}
}
</script>
</body>
</html>
