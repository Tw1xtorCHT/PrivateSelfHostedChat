<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Звонок</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Monospace; background: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        h2 { margin-bottom: 10px; }
        button { background: #000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-family: Monospace; font-size: 14px; margin: 5px; }
        button.red { background: #cc0000; }
        #status { margin: 15px; color: #666; font-size: 13px; text-align: center; }
        #timer { font-size: 28px; margin: 5px; font-weight: bold; }
        .levels { display: flex; gap: 40px; margin: 15px 0; }
        .level-box { text-align: center; }
        .level-label { font-size: 12px; color: #666; margin-bottom: 5px; }
        .level-bar-bg { width: 30px; height: 150px; background: #eee; border: 1px solid #000; position: relative; }
        .level-bar { position: absolute; bottom: 0; width: 100%; background: #000; transition: height 0.05s; }
    </style>
</head>
<body>
    <h2>Голосовой звонок</h2>
    <div class="levels">
        <div class="level-box">
            <div class="level-label">Вы</div>
            <div class="level-bar-bg"><div class="level-bar" id="localLevel"></div></div>
        </div>
        <div class="level-box">
            <div class="level-label">Собеседник</div>
            <div class="level-bar-bg"><div class="level-bar" id="remoteLevel"></div></div>
        </div>
    </div>
    <div id="timer"></div>
    <div id="status">Нажмите "Позвонить"</div>
    <div>
        <button onclick="startCall()">Позвонить</button>
        <button class="red" onclick="endCall()">Завершить</button>
        <button onclick="toggleMute()" id="muteBtn">Мут</button>
    </div>
    <audio id="remoteAudio" autoplay></audio>
    <script src="/signal/socket.io/socket.io.js"></script>
    <script>
        const ROOM = "call_room_1";
        const iceConfig = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "turn:YOUR_DOMAIN:3478", username: "chat", credential: "YOUR_TURN_PASSWORD" }
            ]
        };

        const socket = io({ path: "/signal/socket.io/" });
        let pc = null;
        let localStream = null;
        let isMuted = false;
        let timerInterval = null;
        let seconds = 0;
        let localAnalyser = null;
        let remoteAnalyser = null;
        let audioCtx = null;
        let levelRAF = null;

        function startLevelMeters() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            if (localStream) {
                localAnalyser = audioCtx.createAnalyser();
                localAnalyser.fftSize = 256;
                const localSource = audioCtx.createMediaStreamSource(localStream);
                localSource.connect(localAnalyser);
            }

            updateLevels();
        }

        function connectRemoteAnalyser(stream) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            remoteAnalyser = audioCtx.createAnalyser();
            remoteAnalyser.fftSize = 256;
            const remoteSource = audioCtx.createMediaStreamSource(stream);
            remoteSource.connect(remoteAnalyser);
        }

        function updateLevels() {
            const localBar = document.getElementById("localLevel");
            const remoteBar = document.getElementById("remoteLevel");

            if (localAnalyser) {
                const data = new Uint8Array(localAnalyser.frequencyBinCount);
                localAnalyser.getByteFrequencyData(data);
                const avg = data.reduce((a, b) => a + b, 0) / data.length;
                const pct = Math.min(100, (avg / 128) * 100);
                localBar.style.height = pct + "%";
            } else {
                localBar.style.height = "0%";
            }

            if (remoteAnalyser) {
                const data = new Uint8Array(remoteAnalyser.frequencyBinCount);
                remoteAnalyser.getByteFrequencyData(data);
                const avg = data.reduce((a, b) => a + b, 0) / data.length;
                const pct = Math.min(100, (avg / 128) * 100);
                remoteBar.style.height = pct + "%";
            } else {
                remoteBar.style.height = "0%";
            }

            levelRAF = requestAnimationFrame(updateLevels);
        }

        function stopLevelMeters() {
            if (levelRAF) cancelAnimationFrame(levelRAF);
            if (audioCtx) { audioCtx.close(); audioCtx = null; }
            localAnalyser = null;
            remoteAnalyser = null;
            document.getElementById("localLevel").style.height = "0%";
            document.getElementById("remoteLevel").style.height = "0%";
        }

        socket.on("connect", function(){
            socket.emit("join", ROOM);
            document.getElementById("status").innerText = "Ожидаем собеседника...";
        });

        socket.on("peer-joined", async function(){
            document.getElementById("status").innerText = "Собеседник подключился!";
            await setupMedia();
            pc = createPC();
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit("offer", { room: ROOM, offer: offer });
        });

        socket.on("offer", async function(offer){
            await setupMedia();
            pc = createPC();
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit("answer", { room: ROOM, answer: answer });
            startTimer();
        });

        socket.on("answer", async function(answer){
            await pc.setRemoteDescription(new RTCSessionDescription(answer));
            document.getElementById("status").innerText = "Звонок активен";
            startTimer();
        });

        socket.on("ice", async function(candidate){
            if(pc) await pc.addIceCandidate(new RTCIceCandidate(candidate));
        });

        socket.on("peer-left", function(){
            endCall();
            document.getElementById("status").innerText = "Собеседник отключился";
        });

        function createPC(){
            const p = new RTCPeerConnection(iceConfig);
            localStream.getTracks().forEach(track => p.addTrack(track, localStream));
            p.ontrack = function(e) {
                document.getElementById("remoteAudio").srcObject = e.streams[0];
                connectRemoteAnalyser(e.streams[0]);
            };
            p.onicecandidate = function(e) { if(e.candidate) socket.emit("ice", { room: ROOM, candidate: e.candidate }); };
            return p;
        }

        async function setupMedia(){
            if(localStream) return;
            localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
            startLevelMeters();
        }

        async function startCall(){
            await setupMedia();
            document.getElementById("status").innerText = "Ожидаем собеседника...";
        }

        function endCall(){
            if(pc){ pc.close(); pc = null; }
            if(localStream){ localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            document.getElementById("remoteAudio").srcObject = null;
            stopTimer();
            stopLevelMeters();
            document.getElementById("status").innerText = "Звонок завершён";
        }

        function toggleMute(){
            if(!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
            document.getElementById("muteBtn").innerText = isMuted ? "Включить" : "Мут";
        }

        function startTimer(){
            seconds = 0;
            timerInterval = setInterval(function(){
                seconds++;
                const m = String(Math.floor(seconds/60)).padStart(2,"0");
                const s = String(seconds%60).padStart(2,"0");
                document.getElementById("timer").innerText = m + ":" + s;
            }, 1000);
        }

        function stopTimer(){
            clearInterval(timerInterval);
            document.getElementById("timer").innerText = "";
        }
    </script>
</body>
</html>
